<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Trumps Quiz - Mission</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Serif+KR:wght@400;600;700&family=Open+Sans:wght@600;700&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100dvh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      font-family: "Oswald", sans-serif;
      background: #c8a96e url("./images/map-bg.png") center top / cover no-repeat;
      color: #fff;
      padding: 0;
      overflow: hidden;
    }

    .intro-overlay {
      position: fixed;
      inset: 0;
      z-index: 120;
      display: none;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    .intro-overlay.is-open {
      display: flex;
    }

    .intro-video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: #000;
    }

    .intro-overlay-image {
      position: absolute;
      left: 50%;
      top: clamp(20px, 6vh, 72px);
      transform: translateX(-50%);
      width: min(84vw, 980px);
      max-height: 24vh;
      object-fit: contain;
      filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.5));
      pointer-events: none;
    }

    .intro-start-button {
      position: absolute;
      bottom: clamp(18px, 4vh, 34px);
      left: 50%;
      transform: translateX(-50%);
      border: 2px solid rgba(255, 255, 255, 0.95);
      border-radius: 999px;
      min-width: clamp(170px, 34vw, 280px);
      padding: clamp(13px, 2.1vw, 18px) clamp(24px, 4.2vw, 40px);
      background: rgba(15, 20, 28, 0.85);
      color: #f6f1e7;
      font-family: "Open Sans", sans-serif;
      font-weight: 800;
      font-size: clamp(1.05rem, 3vw, 1.45rem);
      letter-spacing: 0.03em;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.45), inset 0 0 0 1px rgba(255, 255, 255, 0.14);
      cursor: pointer;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-height: 100dvh;
      overflow: hidden;
      padding: 0;
      background-image: url("./images/map-bg.png");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      background-color: #c8a96e;
    }

    .content {
      position: relative;
      z-index: 1;
      width: min(94vw, calc((100dvh - 24px) * 0.82));
      padding: clamp(10px, 2.5dvh, 24px) 0;
      margin: 0 auto;
      --left-col-width: 40%;
    }

    .wood-banner {
      position: relative;
      left: calc((100vw - 100%) / -2);
      display: flex;
      align-items: center;
      width: 56%;
      min-height: clamp(56px, 9vw, 78px);
      margin-bottom: clamp(10px, 2.2vw, 16px);
      padding: 0 clamp(12px, 2vw, 18px);
      background-image: url("./images/wood-banner_T.png");
      background-size: 100% 100%;
      background-repeat: no-repeat;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.35));
    }

    .content > .wood-banner:not(.fact) {
      margin-top: clamp(4px, 0.8vw, 10px);
    }

    .wood-banner.fact {
      left: calc((100vw - 100%) / -2);
      width: calc(var(--left-col-width) + ((100vw - 100%) / 2) - clamp(44px, 6vw, 72px));
      min-height: clamp(60px, 9.5vw, 84px);
      margin-top: clamp(10px, 2vw, 16px);
      margin-bottom: clamp(10px, 2vw, 16px);
      justify-content: center;
      text-align: center;
      line-height: 0.9;
      padding-inline: clamp(12px, 2vw, 18px);
      background-image: url("./images/wood-banner_T.png");
      transform: translateY(clamp(-56px, -7.4vw, -36px));
    }

    .wood-banner.fact span {
      display: block;
      color: #f8f8f8;
      text-shadow: 0 2px 3px rgba(0, 0, 0, 0.5);
    }

    .wood-banner span {
      font-size: clamp(2.05rem, 6vw, 2.9rem);
      letter-spacing: 0.025em;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.55);
      white-space: nowrap;
      font-family: "Bebas Neue", "Oswald", sans-serif;
    }

    .wood-banner span.mission-banner-word {
      font-family: "Algerian", "Bebas Neue", "Oswald", sans-serif;
    }

    .mission-banner-word {
      display: inline-block;
      font-family: "Algerian", "Bebas Neue", "Oswald", sans-serif;
    }

    /* BONUS ?�에 붙는 ?�스?��? 붙어??보이??�?방�? */
    .mission-banner-impact-digit + .mission-banner-word {
      margin-left: 0.34em;
    }

    .mission-banner-word--label {
      margin-right: 0.26em;
    }

    .wood-banner span.mission-banner-number {
      font-family: "Algerian", "Bebas Neue", "Oswald", sans-serif;
      font-size: clamp(4.2rem, 11.6vw, 6.3rem);
      line-height: 0.82;
      vertical-align: -0.14em;
    }

    .wood-banner span.mission-banner-impact-digit {
      display: inline-block;
      transform-origin: center center;
      will-change: transform, opacity;
      font-family: "Algerian", "Bebas Neue", "Oswald", sans-serif;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.55);
    }

    .mission-banner-impact-digit.fired {
      visibility: hidden;
    }

    .mission-impact-float {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      pointer-events: none;
      font-family: "Algerian", "Bebas Neue", "Oswald", sans-serif;
      font-size: clamp(2.05rem, 6vw, 2.9rem);
      line-height: 1;
      color: #ff2a2a;
      will-change: transform, color, text-shadow;
      text-shadow: none;
    }

    .mission-impact-backdrop {
      position: fixed;
      inset: 0;
      z-index: 9998;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.72);
      opacity: 0;
      will-change: opacity;
    }

    .wrong-crack-layer {
      position: fixed;
      inset: 0;
      z-index: 9990;
      pointer-events: none;
      overflow: hidden;
    }

    .wrong-crack-mark {
      position: absolute;
      width: clamp(180px, 34vw, 420px);
      height: auto;
      opacity: 0;
      transform-origin: center center;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.38));
      mix-blend-mode: screen;
      animation: wrong-crack-pop 260ms ease-out forwards;
    }

    @keyframes wrong-crack-pop {
      0% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.84);
      }
      100% {
        opacity: 0.98;
        transform: translate(-50%, -50%) scale(1);
      }
    }

    .wood-banner.fact span {
      white-space: normal;
      font-size: clamp(1.45rem, 4vw, 1.95rem);
      line-height: 0.88;
    }

    .wood-banner.fact .line {
      display: block;
      white-space: nowrap;
    }

    .wood-banner.fact .line-top {
      font-size: 1.04em;
      letter-spacing: -0.01em;
      font-weight: 400;
      font-family: "Bebas Neue", "Oswald", sans-serif;
    }

    .wood-banner.fact .line-bottom {
      font-size: 0.97em;
      letter-spacing: 0.01em;
      font-family: "Georgia", "Times New Roman", serif;
      font-weight: 600;
    }

    .card {
      width: 94%;
      margin: 0 auto;
      background: transparent;
      box-shadow: none;
      padding: 0;
      aspect-ratio: 1.34;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-wrap {
      position: relative;
      transform: translateY(clamp(-18px, -2.8vw, -10px));
    }

    .zoom-button {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: clamp(52px, 9vw, 72px);
      height: clamp(52px, 9vw, 72px);
      border: 1px solid rgba(48, 32, 18, 0.55);
      border-radius: 999px;
      background: rgba(255, 251, 240, 0.92);
      color: #2b1b0f;
      font-size: clamp(1.5rem, 3vw, 2rem);
      cursor: pointer;
      box-shadow:
        0 8px 18px rgba(0, 0, 0, 0.55),
        0 0 0 2px rgba(255, 255, 255, 0.28);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .zoom-button:hover {
      transform: translate(-50%, calc(-50% - 1px));
    }

    .zoom-button::before {
      content: "?��?지 ?�인?�기";
      position: absolute;
      top: calc(-1 * clamp(40px, 5.3vw, 51px));
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: clamp(0.75rem, 2.4vw, 28px);
      font-weight: 700;
      white-space: nowrap;
      text-shadow:
        0 2px 6px rgba(0, 0, 0, 0.9),
        1px 0 0 rgba(0, 0, 0, 0.85),
        -1px 0 0 rgba(0, 0, 0, 0.85),
        0 1px 0 rgba(0, 0, 0, 0.85),
        0 -1px 0 rgba(0, 0, 0, 0.85);
      pointer-events: none;
    }

    .problem-modal {
      position: fixed;
      inset: 0;
      display: none;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 18px;
      background: rgba(0, 0, 0, 0.52);
      z-index: 20;
      opacity: 0;
      transition: opacity 240ms ease;
    }

    .problem-modal.is-open {
      display: flex;
      opacity: 1;
    }

    .problem-modal-card {
      width: min(94vw, 790px);
      max-height: 92dvh;
      background: #f5e7ca;
      border: 5px solid #800714;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.38);
      padding: 12px;
      color: #2f2316;
      display: flex;
      flex-direction: column;
      position: relative;
      opacity: 0;
      transform: translateY(16px) scale(0.72);
      transform-origin: center center;
      will-change: transform, opacity;
    }

    .problem-modal.is-open .problem-modal-card {
      opacity: 1;
      transform: translateY(0) scale(1);
      animation: problem-modal-pop-in 480ms cubic-bezier(0.34, 1.02, 0.64, 1) both;
    }

    .problem-modal.is-closing {
      opacity: 0;
    }

    .problem-modal.is-closing .problem-modal-card {
      opacity: 0;
      transform: translateY(10px) scale(0.965);
      animation: problem-modal-pop-out 360ms ease both;
    }

    @keyframes problem-modal-pop-in {
      0% {
        opacity: 0;
        transform: translateY(16px) scale(0.72);
      }
      58% {
        opacity: 1;
        transform: translateY(0) scale(1.045);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes problem-modal-pop-out {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1) rotate(0deg);
      }
      100% {
        opacity: 0;
        transform: translateY(12px) scale(0.955) rotate(-0.35deg);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .problem-modal,
      .problem-modal-card,
      .problem-modal.is-open .problem-modal-card,
      .problem-modal.is-closing .problem-modal-card {
        transition: none !important;
        animation: none !important;
        transform: none !important;
      }
    }

    .problem-modal-close {
      position: absolute;
      top: 8px;
      right: 24px;
      z-index: 2;
      border: none;
      background: transparent;
      color: #ffffff;
      font-size: 4.2rem;
      cursor: pointer;
      line-height: 1;
      text-shadow: 0 2px 6px rgba(0, 0, 0, 0.8);
    }

    .problem-modal-body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 8px;
      font-family: "Open Sans", sans-serif;
      font-size: 1rem;
      line-height: 1.45;
    }

    .problem-modal-image {
      width: 100%;
      height: auto;
      flex: 0 1 auto;
      max-width: 100%;
      max-height: 68dvh;
      display: block;
      margin: 0 auto;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    .problem-modal-question {
      flex: 0 0 auto;
      min-height: calc(1.5em * 3 + 20px);
      max-height: calc(1.5em * 3 + 20px);
      overflow-y: auto;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid rgba(64, 42, 20, 0.35);
      background: rgba(255, 250, 240, 0.78);
      color: #2f2316;
      font-family: "Noto Serif KR", serif;
      font-size: clamp(16px, 2.8vw, 24px);
      font-weight: 700;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: anywhere;
    }

    .page-turn-overlay {
      position: fixed;
      inset: 0;
      z-index: 35;
      display: none;
      pointer-events: none;
      overflow: hidden;
      perspective: 2200px;
    }

    .page-turn-overlay.is-active {
      display: block;
    }

    .page-turn-sheet {
      position: absolute;
      right: -10%;
      top: -8%;
      width: 132%;
      height: 136%;
      transform-origin: right center;
      transform: rotate(0deg) scaleX(1);
      border-left: 1px solid rgba(0, 0, 0, 0.2);
      border-radius: 42% 0 0 42% / 58% 0 0 58%;
      background: linear-gradient(126deg, #ffffff 0%, #f5f5f5 44%, #dfdfdf 70%, #cbcbcb 100%);
      box-shadow:
        -18px 0 34px rgba(0, 0, 0, 0.24),
        -44px 0 68px rgba(0, 0, 0, 0.2);
      transition: transform 0.75s cubic-bezier(0.645, 0.045, 0.355, 1);
    }

    .page-turn-sheet.is-back {
      background: linear-gradient(114deg, #f3f3f3 0%, #e8e8e8 55%, #d7d7d7 100%);
      box-shadow:
        -12px 0 28px rgba(0, 0, 0, 0.2),
        -32px 0 52px rgba(0, 0, 0, 0.16);
    }

    .page-turn-sheet.back {
      transform: rotate(0deg) translate(0, 0) scaleX(0);
      opacity: 0;
      transition:
        transform 1.05s cubic-bezier(0.645, 0.045, 0.355, 1),
        opacity 0.2s linear;
    }

    .page-turn-sheet::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(102deg, rgba(255, 255, 255, 0.7) 0%, rgba(255, 255, 255, 0.2) 24%, rgba(0, 0, 0, 0.1) 62%, rgba(0, 0, 0, 0.24) 100%);
      border-radius: inherit;
      mix-blend-mode: multiply;
    }

    .page-turn-overlay.phase-1 .page-turn-sheet.front {
      transform: rotate(0deg) scaleX(0);
    }

    .page-turn-overlay.phase-2 .page-turn-sheet.back {
      opacity: 1;
      transform: rotate(0deg) translate(-46%, 0) scaleX(-1);
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      filter: contrast(1.04);
      transform: none;
      clip-path: none;
    }

    .fact-grid {
      width: 100%;
      margin: clamp(14px, 2.2vw, 20px) 0 0;
      display: grid;
      grid-template-columns: var(--left-col-width) calc((100% - var(--left-col-width)) / 2) calc((100% - var(--left-col-width)) / 2);
      grid-template-rows: repeat(3, minmax(46px, 1.08fr)) minmax(34px, 0.72fr) minmax(90px, 2.1fr);
      gap: clamp(20px, 3.8vw, 30px);
      min-height: clamp(280px, 44vw, 390px);
      transform: translateY(clamp(-24px, -3.4vw, -16px));
    }

    .cell {
      background: #efefef;
      box-shadow: 2px 4px 8px rgba(0, 0, 0, 0.34);
      border: none;
      filter: drop-shadow(0 3px 4px rgba(0, 0, 0, 0.2));
    }

    .cell-label {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: clamp(6px, 1vw, 10px);
      padding-inline: clamp(12px, 2vw, 18px);
      padding-block: clamp(6px, 0.9vw, 10px);
      color: #3f2f1d;
      font-family: "Open Sans", sans-serif;
      font-weight: 700;
      font-size: clamp(1.35rem, 2.35vw, 1.95rem);
      letter-spacing: 0.01em;
      text-align: left;
      overflow: visible;
    }

    .label-name {
      white-space: nowrap;
      text-align: left;
    }

    .label-value {
      position: absolute;
      left: calc(100% - clamp(100px, 17.2vw, 158px));
      top: 50%;
      transform: translateY(-50%);
      min-width: 1.2ch;
      text-align: left;
      font-family: "Open Sans", "Oswald", sans-serif;
      font-weight: 800;
      font-size: clamp(4.29rem, 8.32vw, 6.37rem);
      line-height: 0.9;
      letter-spacing: 0;
      color: #e9dfd9;
      -webkit-text-stroke: 0;
      text-shadow:
        2px 0 0 #2a1b14,
        -2px 0 0 #2a1b14,
        0 2px 0 #2a1b14,
        0 -2px 0 #2a1b14,
        1.5px 1.5px 0 #2a1b14,
        -1.5px 1.5px 0 #2a1b14,
        1.5px -1.5px 0 #2a1b14,
        -1.5px -1.5px 0 #2a1b14,
        0 2px 4px rgba(0, 0, 0, 0.55);
      z-index: 3;
    }

    @media (max-width: 640px) {
      .cell-label {
        padding-inline: clamp(8px, 1.6vw, 12px);
      }

      .label-value {
        font-size: clamp(1.56rem, 6.5vw, 2.34rem);
      }
    }

    .cell-left {
      grid-column: 1;
      grid-row: 1 / 6;
      transform: rotate(-1deg) scale(1.22);
      transform-origin: center center;
      box-shadow: none;
      z-index: 1;
      padding: clamp(22px, 3vw, 32px) clamp(18px, 2.8vw, 30px);
      display: flex;
      flex-direction: column;
      gap: clamp(14px, 1.8vw, 20px);
      align-items: center;
      justify-content: flex-start;
      background: transparent url("./images/panel-3.png") center / contain no-repeat !important;
      border: none;
      filter: none;
      overflow: hidden;
    }

    .question-title {
      color: #f6f2eb;
      font-family: "Open Sans", sans-serif;
      font-weight: 800;
      font-size: clamp(1.45rem, 2.8vw, 2.05rem);
      line-height: 1.28;
      white-space: pre-line;
      text-align: center;
      width: 100%;
      margin-top: clamp(40px, 6.4vw, 60px);
      transform: translateX(-8px);
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.45);
    }

    .question-title .answer-emphasis {
      color: #8b1414;
      font-weight: 900;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
    }

    .question-options {
      display: flex;
      flex-direction: column;
      gap: clamp(8px, 1vw, 12px);
      align-items: center;
      width: 100%;
      margin-top: clamp(16px, 2.8vw, 24px);
      transform: translateX(-8px);
    }

    .question-option {
      border: 1px solid rgba(69, 49, 29, 0.35);
      background: rgba(240, 218, 178, 0.72);
      color: #352818;
      text-align: center;
      cursor: pointer;
      font-family: "Open Sans", sans-serif;
      font-size: clamp(1.14rem, 2.1vw, 1.5rem);
      line-height: 1.25;
      padding: clamp(6px, 1vw, 10px) clamp(8px, 1.4vw, 11px);
      border-radius: 8px;
      min-width: min(70%, 250px);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.16);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background-color 0.12s ease;
    }

    .question-option:hover {
      background: rgba(243, 224, 189, 0.9);
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
      transform: translateY(-1px);
    }

    .question-option.selected {
      background: rgba(245, 230, 200, 0.95);
      border-color: #7a1e36;
      box-shadow:
        0 0 0 2px rgba(122, 30, 54, 0.95),
        0 0 0 5px rgba(122, 30, 54, 0.28),
        0 3px 8px rgba(0, 0, 0, 0.22);
    }

    .question-option:disabled {
      opacity: 0.7;
      cursor: default;
      transform: none;
    }

    .top-timer {
      position: absolute;
      top: clamp(22px, 3.8dvh, 34px);
      right: clamp(62px, 6vw, 84px);
      z-index: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      width: auto;
      color: #f2efe7;
    }

    .timer-value {
      font-family: "Bebas Neue", "Oswald", sans-serif;
      font-size: clamp(3.3rem, 6.8vw, 5rem);
      letter-spacing: 0.06em;
      line-height: 1;
      color: #f6f1e7;
      text-shadow:
        1px 0 0 #3f2416,
        -1px 0 0 #3f2416,
        0 1px 0 #3f2416,
        0 -1px 0 #3f2416,
        0 2px 3px rgba(0, 0, 0, 0.45);
    }

    .timer-label {
      margin-top: 4px;
      display: block;
      font-family: "Bebas Neue", "Oswald", sans-serif;
      font-size: clamp(1.35rem, 2.8vw, 1.95rem);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 800;
      color: #efe9dc;
      white-space: nowrap;
      text-shadow:
        1px 0 0 #3f2416,
        -1px 0 0 #3f2416,
        0 1px 0 #3f2416,
        0 -1px 0 #3f2416,
        0 2px 3px rgba(0, 0, 0, 0.45);
    }

  <script>
    const TIMER_START_KEY = "toptrumps_final_timer_start_ms";

    const TIMER_MAX_MINUTES = 60;

    const questionOptionsContainerElement = document.querySelector(".question-options");
    const problemModalImageElement = document.querySelector(".problem-modal-image");
    const problemModalQuestionElement = document.querySelector(".problem-modal-question");

    const currentPageName = window.location.pathname.split("/").pop() || "";
    const navEntries = typeof performance.getEntriesByType === "function"
      ? performance.getEntriesByType("navigation")
      : [];
    const navType = navEntries.length > 0 ? navEntries[0].type : "";
    const WRONG_CRACK_IMAGE_SRC = "./images/깨�????��?지3.png";
    const MAX_WRONG_CRACK_MARKS = 6;
    if (navType === "reload") {
      localStorage.setItem(SHARED_COUNT_KEYS.correct, "0");
      localStorage.setItem(SHARED_COUNT_KEYS.wrong, "0");
      localStorage.setItem(SHARED_COUNT_KEYS.bonusScore, "0");
      localStorage.removeItem("toptrumps_shared_cannon_count");
      Object.keys(localStorage)
        .filter((key) => key.startsWith("toptrumps_bonus_share_done_"))
        .forEach((key) => localStorage.removeItem(key));
      try {
        localStorage.removeItem(SKIP_INTRO_OVERLAY_KEY);
        sessionStorage.removeItem("toptrumps_intro_bgm_resume_s");
      } catch (_) {}
    }
    if (navType === "reload" && currentPageName !== "" && currentPageName !== "index.html" && currentPageName !== "mission01.html") {
      window.location.replace("index.html");
    }

    function isMissionStartPage() {
      return currentPageName === "" || currentPageName === "index.html" || currentPageName === "mission01.html";
    }

    function closeIntroOverlay() {
      if (isMissionStartPage()) {
        stopIntroAutoplayRetry();
        try {
          sessionStorage.setItem("toptrumps_intro_bgm_resume_s", String(introVideoElement.currentTime || 0));
        } catch (_) {}
        // Intro -> intro2: keep overlay until navigation so mission UI does not flash underneath.
        try {
          localStorage.removeItem(SKIP_INTRO_OVERLAY_KEY);
        } catch (_) {}
        try {
          sessionStorage.setItem("toptrumps_pending_intro2", "1");
        } catch (_) {}
        window.location.replace("intro2.html");
        return;
      }
      introOverlayElement.classList.remove("is-open");
      introOverlayElement.setAttribute("aria-hidden", "true");
      stopIntroAutoplayRetry();
      introVideoElement.muted = true;
      introVideoElement.volume = 0;
      introVideoElement.pause();
      introVideoElement.currentTime = 0;
    }

    let introAudioContext = null;
    let introGainNode = null;
    let introMediaSourceNode = null;
    let introAutoplayRetryTimerId = null;
    let introAutoplayRetryCount = 0;
    function ensureIntroLoudGain() {
      try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        if (!introAudioContext) introAudioContext = new Ctx();
        if (introAudioContext.state === "suspended") introAudioContext.resume().catch(() => {});
        if (!introGainNode) {
          introGainNode = introAudioContext.createGain();
          // Louder intro: ~20x boost
          introGainNode.gain.value = 20.0;
          introGainNode.connect(introAudioContext.destination);
        }
        if (!introMediaSourceNode) {
          introMediaSourceNode = introAudioContext.createMediaElementSource(introVideoElement);
          introMediaSourceNode.connect(introGainNode);
        }
      } catch (_) {
        // Ignore if browser blocks/doesn't support MediaElementSource in this context.
      }
    }

    function stopIntroAutoplayRetry() {
      if (introAutoplayRetryTimerId) {
        clearInterval(introAutoplayRetryTimerId);
        introAutoplayRetryTimerId = null;
      }
      introAutoplayRetryCount = 0;
    }

    function scheduleIntroAutoplayRetry() {
      if (introAutoplayRetryTimerId) return;
      introAutoplayRetryCount = 0;
      introAutoplayRetryTimerId = setInterval(() => {
        if (!introOverlayElement.classList.contains("is-open")) {
          stopIntroAutoplayRetry();
          return;
        }
        introAutoplayRetryCount += 1;
        // Try a few seconds; if blocked by policy it will keep failing until user interacts.
        if (introAutoplayRetryCount > 14) {
          stopIntroAutoplayRetry();
          return;
        }
        ensureIntroLoudGain();
        introVideoElement.muted = false;
        introVideoElement.volume = 1;
        introVideoElement.play().catch(() => {});
      }, 350);
    }

    function openIntroOverlayIfNeeded() {
      if (!isMissionStartPage()) return;

      const skipIntro = localStorage.getItem(SKIP_INTRO_OVERLAY_KEY) === "1";
      if (skipIntro) {
        try {
          localStorage.removeItem(SKIP_INTRO_OVERLAY_KEY);
        } catch (_) {}
        // Ensure we're on mission 01
        if (String(window.location.hash || "").toLowerCase() !== "#mission01") {
          window.location.hash = "mission01";
        }
        // Auto-start after mission UI has been configured.
        setTimeout(() => {
          // Mission UI exists now; trigger the same start effects as if "??  ?? was pressed.
          playMissionStartImpact();
          startMission1Bgm();
        }, 40);
        return;
      }

      introOverlayElement.classList.add("is-open");
      introOverlayElement.setAttribute("aria-hidden", "false");
      stopMission1Bgm();
      // If URL hash was left at a later mission, force intro to start from Mission 1.
      if (String(window.location.hash || "").toLowerCase() !== "#mission01") {
        window.location.hash = "mission01";
        try {
          setMissionNumber(1);
        } catch (_) {}
      }
      ensureIntroLoudGain();
      introVideoElement.muted = false;
      introVideoElement.volume = 1;
      const playPromise = introVideoElement.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(() => {
          // Autoplay with sound can be blocked by browser policy. Keep trying without forcing mute.
          scheduleIntroAutoplayRetry();
        });
      }
    }

    function unlockAutoplayOnce() {
      try {
        localStorage.setItem(AUTOPLAY_UNLOCK_KEY, "1");
      } catch (_) {}
      ensureIntroLoudGain();
      // Try immediately after first user gesture.
      if (introOverlayElement.classList.contains("is-open")) {
        introVideoElement.muted = false;
        introVideoElement.volume = 1;
        introVideoElement.play().catch(() => {});
      }
    }

    const GLOBAL_BGM_TIME_KEY = "toptrumps_global_bgm_time_s";
    let lastBgmTimeSaveMs = 0;

    function restoreBgmTimeWhenReady() {
      if (!mission1BgmVideoElement) return;
      const saved = Number(localStorage.getItem(GLOBAL_BGM_TIME_KEY));
      if (!Number.isFinite(saved) || saved <= 0) return;
      const apply = () => {
        try {
          if (Number.isFinite(mission1BgmVideoElement.duration) && saved >= mission1BgmVideoElement.duration) {
            return;
          }
          mission1BgmVideoElement.currentTime = saved;
        } catch (_) {}
      };
      if (mission1BgmVideoElement.readyState >= 1) apply();
      else mission1BgmVideoElement.addEventListener("loadedmetadata", apply, { once: true });
    }

    function saveBgmTimeThrottled() {
      if (!mission1BgmVideoElement) return;
      const now = Date.now();
      if (now - lastBgmTimeSaveMs < 900) return;
      lastBgmTimeSaveMs = now;
      try {
        localStorage.setItem(GLOBAL_BGM_TIME_KEY, String(mission1BgmVideoElement.currentTime || 0));
      } catch (_) {}
    }

    function saveBgmTimeNow() {
      if (!mission1BgmVideoElement) return;
      lastBgmTimeSaveMs = Date.now();
      try {
        localStorage.setItem(GLOBAL_BGM_TIME_KEY, String(mission1BgmVideoElement.currentTime || 0));
      } catch (_) {}
    }

    function startMission1Bgm() {
      if (!mission1BgmVideoElement) return;
      mission1BgmVideoElement.loop = true;
      mission1BgmVideoElement.muted = false;
      mission1BgmVideoElement.volume = 0.7;
      restoreBgmTimeWhenReady();
      const p = mission1BgmVideoElement.play();
      if (p && typeof p.catch === "function") {
        p.catch(() => {
          // Autoplay policy fallback
          mission1BgmVideoElement.muted = true;
          mission1BgmVideoElement.play().catch(() => {});
        });
      }
    }

    function stopMission1Bgm() {
      if (!mission1BgmVideoElement) return;
      saveBgmTimeThrottled();
      mission1BgmVideoElement.pause();
    }

    function tryEnableIntroSound() {
      if (!introOverlayElement.classList.contains("is-open")) return;
      if (!introVideoElement.muted) return;
      ensureIntroLoudGain();
      introVideoElement.muted = false;
      introVideoElement.volume = 1;
      const playPromise = introVideoElement.play();
      if (playPromise && typeof playPromise.catch === "function") {
        playPromise.catch(() => {
          introVideoElement.muted = true;
        });
      }
    }

    introStartButtonElement.addEventListener("click", closeIntroOverlay);
    introOverlayElement.addEventListener("pointerdown", tryEnableIntroSound);
    document.addEventListener("keydown", tryEnableIntroSound);
    openIntroOverlayIfNeeded();

    // If the user has ever interacted once, autoplay is usually allowed on reload.
    if (localStorage.getItem(AUTOPLAY_UNLOCK_KEY) === "1") {
      setTimeout(() => {
        if (!introOverlayElement.classList.contains("is-open")) return;
        ensureIntroLoudGain();
        introVideoElement.muted = false;
        introVideoElement.volume = 1;
        introVideoElement.play().catch(() => scheduleIntroAutoplayRetry());
      }, 0);
    }

    // First user gesture on this site unlocks audio for future reloads.
    document.addEventListener("pointerdown", unlockAutoplayOnce, { once: true });
    document.addEventListener("keydown", unlockAutoplayOnce, { once: true });

    // Non-start missions should keep BGM running (resume from saved position).
    if (!isMissionStartPage()) startMission1Bgm();

    function getCurrentMissionNumber() {
      const hash = String(window.location.hash || "");
      const hashMatch = hash.match(/#mission(\d{2})/i);
      if (hashMatch) return Number.parseInt(hashMatch[1], 10) || 1;
      if (currentPageName === "" || currentPageName === "index.html" || currentPageName === "mission01.html") return 1;
      const match = currentPageName.match(/^mission(\d{2})\.html$/i);
      if (!match) return 1;
      return Number.parseInt(match[1], 10) || 1;

      const totalSeconds = Math.max(0, Math.floor(ms / 1000));
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function ensureWrongCrackLayer() {
      let layer = document.getElementById("wrongCrackLayer");
      if (layer) return layer;
      layer = document.createElement("div");
      layer.id = "wrongCrackLayer";
      layer.className = "wrong-crack-layer";

    function clearWrongCrackLayer() {
      const layer = document.getElementById("wrongCrackLayer");

    function spawnWrongCrackMark() {

      mark.className = "wrong-crack-mark";

      const rotation = -28 + Math.random() * 56;
      const scale = 0.78 + Math.random() * 0.52;
      const clampedX = Math.max(40, Math.min(window.innerWidth - 40, x));
      const clampedY = Math.max(40, Math.min(window.innerHeight - 40, y));
      mark.style.left = `${clampedX}px`;
      mark.style.top = `${clampedY}px`;
      mark.style.transform = `translate(-50%, -50%) rotate(${rotation}deg) scale(${scale})`;
      mark.onerror = () => {

    function renderMissionBannerText(rawText) {
      const text = String(rawText || "").trim();
      const bonusMatch = text.match(/^BONUS\b/i);
      if (bonusMatch) {
        const restText = text.slice(bonusMatch[0].length);
        missionBannerElement.innerHTML = `
          <span class="mission-banner-impact-digit">${bonusMatch[0]}</span><span class="mission-banner-word">${restText}</span>
        `;
        return;
      }

      const digitMatch = text.match(/^(.*?)(\d+)$/);
      if (!digitMatch) {
        missionBannerElement.textContent = text;
        return;
      }

      const labelText = digitMatch[1];
      const numberText = digitMatch[2];
      const compactNumber = String(Number.parseInt(numberText, 10));
      const safeNumber = compactNumber === "NaN" ? numberText : compactNumber;
      const numberPrefix = safeNumber.slice(0, -1);
      const impactDigit = safeNumber.slice(-1);

      missionBannerElement.innerHTML = `
        <span class="mission-banner-word mission-banner-word--label">${labelText}</span><span class="mission-banner-word mission-banner-number">${numberPrefix}</span><span class="mission-banner-impact-digit mission-banner-number">${impactDigit}</span>

    function playMissionStartImpact() {
      const chars = missionBannerElement.querySelectorAll(".mission-banner-impact-digit");
      if (chars.length === 0) return;

      chars.forEach((c) => {
        c.classList.remove("fired");
      });

      chars.forEach((c) => {
        const rect = c.getBoundingClientRect();
        const targetCenterX = rect.left + rect.width / 2;
        const targetCenterY = rect.top + rect.height / 2;
        const viewportCenterX = window.innerWidth / 2;
        const viewportCenterY = window.innerHeight / 2;
        const isBonusText = (c.textContent || "").trim().toUpperCase() === "BONUS";
        const viewportSafeWidth = window.innerWidth * 0.9;
        const viewportSafeHeight = window.innerHeight * 0.75;
        const maxScaleByWidth = viewportSafeWidth / Math.max(rect.width, 1);
        const maxScaleByHeight = viewportSafeHeight / Math.max(rect.height, 1);
        const maxAllowedScale = Math.max(1.25, Math.min(maxScaleByWidth, maxScaleByHeight));
        // Keep the impact readable but not overly huge (was too big for '1').
        const impactScaleCap = isBonusText ? 6.6 : 7.4;
        const impactScale = Math.min(impactScaleCap, maxAllowedScale);
        const holdScaleCap = isBonusText ? 5.6 : 6.2;
        const holdScale = Math.min(holdScaleCap, Math.max(1.1, impactScale * (isBonusText ? 0.82 : 0.84)));
        const centerBaseX = viewportCenterX - rect.width / 2;
        const centerBaseY = viewportCenterY - rect.height / 2;
        const targetBaseX = targetCenterX - rect.width / 2;
        const targetBaseY = targetCenterY - rect.height / 2;

        const floatChar = document.createElement("span");
        floatChar.className = "mission-impact-float";
        floatChar.textContent = c.textContent || "";
        const targetStyle = window.getComputedStyle(c);
        floatChar.style.fontSize = targetStyle.fontSize;
        floatChar.style.lineHeight = targetStyle.lineHeight;
        floatChar.style.fontFamily = targetStyle.fontFamily;
        floatChar.style.fontWeight = targetStyle.fontWeight;
        const backdrop = document.createElement("div");
        backdrop.className = "mission-impact-backdrop";
        document.body.appendChild(backdrop);
        document.body.appendChild(floatChar);

        c.classList.add("fired");

        const backdropAnimation = backdrop.animate(
          [
            { opacity: 0 },
            { offset: 0.12, opacity: 1 },
            { offset: 0.82, opacity: 1 },
            { opacity: 0 }
          ],
          {
            duration: 1100,
            easing: "linear",
            fill: "forwards"
          }
        );

        const animation = floatChar.animate(
          [
            {
              transform: `translate(${centerBaseX}px, ${centerBaseY}px) scale(${impactScale})`,
              color: "#ff2a2a",
              textShadow: "none",
              easing: "cubic-bezier(0.14, 0.95, 0.22, 1)"
            },
            {
              offset: 0.05,
              transform: `translate(${centerBaseX}px, ${centerBaseY}px) scale(${holdScale})`,
              color: "#ff2a2a",
              textShadow: "none",
              easing: "cubic-bezier(0.18, 0.86, 0.24, 1)"
            },
            {
              offset: 0.55,
              transform: `translate(${centerBaseX}px, ${centerBaseY}px) scale(${holdScale})`,
              color: "#ff2a2a",
              textShadow: "none",
              easing: "linear"
            },
            {
              transform: `translate(${targetBaseX}px, ${targetBaseY}px) scale(1)`,
              color: "#ffffff",
              textShadow: "0 2px 4px rgba(0, 0, 0, 0.55)",
              easing: "cubic-bezier(0.06, 1, 0.14, 1)"
            }
          ],
          {
            duration: 1100,
            easing: "linear",
            fill: "forwards"
          }
        );

        animation.onfinish = () => {
          c.classList.remove("fired");
          floatChar.remove();
          backdrop.remove();
        };
        animation.oncancel = () => {
          c.classList.remove("fired");
          floatChar.remove();
          backdrop.remove();
        };
        backdropAnimation.oncancel = () => {
          backdrop.remove();
        };
      });
    }

    function getOrCreateStartTime() {
      const pageName = window.location.pathname.split("/").pop() || "";
      const isMissionStartPage = pageName === "" || pageName === "index.html" || pageName === "mission01.html";
      if (isMissionStartPage) {
        const now = Date.now();
        localStorage.setItem(TIMER_START_KEY, String(now));
        return now;
      }

      const saved = Number(localStorage.getItem(TIMER_START_KEY));
      if (Number.isFinite(saved) && saved > 0) return saved;
      const now = Date.now();
      localStorage.setItem(TIMER_START_KEY, String(now));
      return now;
    }

    const timerStart = getOrCreateStartTime();

    function renderTimer() {
      const now = Date.now();
      const elapsed = now - timerStart;
      timerProgressTextElement.textContent = formatElapsed(elapsed);
    }

    renderTimer();
    setInterval(renderTimer, 1000);

    const correctCountElement = document.getElementById("correctCount");
    const wrongCountElement = document.getElementById("wrongCount");
    const bonusScoreElement = document.getElementById("bonusScore");
    const sfxCorrectElement = document.getElementById("sfxCorrect");
    const sfxWrongElement = document.getElementById("sfxWrong");
    const sfxClickElement = document.getElementById("sfxClick");
    const sfxPaperElement = document.getElementById("sfxPaper");
    const submitAnswerButton = document.getElementById("submitAnswerButton");
    const openProblemModalButton = document.getElementById("openProblemModalButton");
    const closeProblemModalButton = document.getElementById("closeProblemModalButton");
    const problemModal = document.getElementById("problemModal");
    const problemModalCard = document.getElementById("problemModalCard");
    const cardWrap = document.querySelector(".card-wrap");
    const optionButtons = document.querySelectorAll(".question-option");
    let currentMissionNumber = getCurrentMissionNumber();
    let bonusGatePassedKey = `toptrumps_bonus_gate_passed_${currentMissionNumber}`;
    const missionDefaultConfig = {
      questionTitleHtml: '?�내?�서 ?��?지??br><span class="answer-emphasis">?�답</span>??맞추?�요.',
      popupQuestionText: "?�음 ?�진??(  ?  ) ???�답?�?",
      popupImageSrc: "./images/problem-popup-mission01.png",
      popupImageAlt: "문제 ?��?지",
      options: [
        { label: "1. ?�이 102.4km", correct: false },
        { label: "2. ?�발 986.5m", correct: true },
        { label: "3. ?�선 2만년??, correct: false },
      ]
    };
    const missionConfigMap = window.MISSION_CONFIGS || {};
    let missionConfig = {
      ...missionDefaultConfig,
      ...(missionConfigMap[currentMissionNumber] || {})
    };
    let isBonusMission = Boolean(missionConfig.isBonus);
    let requiresPasscode = Boolean(missionConfig.requirePasscode);

    function ensureBonusActions(config) {
      let bonusActions = document.getElementById("bonusActions");
      if (!bonusActions) {
        bonusActions = document.createElement("div");
        bonusActions.id = "bonusActions";
        bonusActions.style.display = "flex";
        bonusActions.style.flexDirection = "column";
        bonusActions.style.gap = "8px";
        bonusActions.style.alignItems = "center";
        bonusActions.style.marginTop = "8px";
        questionOptionsContainerElement.insertAdjacentElement("afterend", bonusActions);
      }

      bonusActions.innerHTML = "";
      // If this bonus mission doesn't require a passcode UI, hide the whole area.
      bonusActions.style.display = requiresPasscode ? "flex" : "none";
      if (!requiresPasscode) {
        submitAnswerButton.disabled = false;
        return;
      }

      const passcodeLabel = document.createElement("p");
      passcodeLabel.textContent = config.passcodeLabelText || "?�호 ?�력";
      passcodeLabel.style.color = "#352818";
      passcodeLabel.style.fontFamily = "\"Open Sans\", sans-serif";
      passcodeLabel.style.fontWeight = "800";
      passcodeLabel.style.fontSize = "clamp(0.9rem, 1.5vw, 1.05rem)";
      passcodeLabel.style.textAlign = "center";

      const passcodeInput = document.createElement("input");
      passcodeInput.type = "text";
      passcodeInput.id = "bonusPasscodeInput";
      passcodeInput.placeholder = config.passcodePlaceholder || "?�호 ?�력";
      passcodeInput.autocomplete = "off";
      passcodeInput.spellcheck = false;
      passcodeInput.style.width = "min(70%, 250px)";
      passcodeInput.style.height = "42px";
      passcodeInput.style.border = "1px solid rgba(69, 49, 29, 0.35)";
      passcodeInput.style.borderRadius = "8px";
      passcodeInput.style.background = "rgba(240, 218, 178, 0.82)";
      passcodeInput.style.color = "#352818";
      passcodeInput.style.padding = "0 12px";
      passcodeInput.style.fontFamily = "\"Open Sans\", sans-serif";
      passcodeInput.style.fontSize = "clamp(0.95rem, 1.6vw, 1.1rem)";

      const passcodeButton = document.createElement("button");
      passcodeButton.type = "button";
      passcodeButton.id = "bonusPasscodeConfirmButton";
      passcodeButton.className = "question-option";
      passcodeButton.textContent = config.passcodeButtonText || "?�인";
      passcodeButton.style.minWidth = "min(70%, 250px)";

      const passcodeError = document.createElement("p");
      passcodeError.textContent = "";
      passcodeError.style.minHeight = "1.1em";
      passcodeError.style.color = "#8b0000";
      passcodeError.style.fontFamily = "\"Open Sans\", sans-serif";
      passcodeError.style.fontWeight = "700";
      passcodeError.style.fontSize = "clamp(0.8rem, 1.3vw, 0.92rem)";
      passcodeError.style.textAlign = "center";

      const passcodeSuccess = document.createElement("p");
      passcodeSuccess.textContent = "";
      passcodeSuccess.style.minHeight = "1.1em";
      passcodeSuccess.style.color = "#1d6b2a";
      passcodeSuccess.style.fontFamily = "\"Open Sans\", sans-serif";
      passcodeSuccess.style.fontWeight = "700";
      passcodeSuccess.style.fontSize = "clamp(0.8rem, 1.3vw, 0.92rem)";
      passcodeSuccess.style.textAlign = "center";

      const validatePasscode = () => {
        const expectedPasscode = String(config.passcode || "").trim();
        const enteredPasscode = passcodeInput.value.trim();
        if (expectedPasscode && enteredPasscode === expectedPasscode) {
          localStorage.setItem(bonusGatePassedKey, "1");
          bonusScore += 5;
          saveSharedCounts();
          renderSharedCounts();
          submitAnswerButton.disabled = false;
          passcodeInput.disabled = true;
          passcodeButton.disabled = true;
          passcodeError.textContent = "";
          passcodeSuccess.textContent = config.passcodeSuccessText || "?�호가 맞습?�다. ?�음 미션 버튼 ?�릭?�주?�요.";
          return;
        }
        passcodeInput.value = "";
        passcodeSuccess.textContent = "";
        passcodeError.textContent = config.passcodeErrorText || "?�호가 ?�바르�? ?�습?�다.";
      };

      passcodeButton.addEventListener("click", validatePasscode);
      passcodeInput.addEventListener("keydown", (event) => {
        if (event.key === "Enter") validatePasscode();
      });
      passcodeInput.addEventListener("input", () => {
        passcodeError.textContent = "";
        passcodeSuccess.textContent = "";
      });

      bonusActions.appendChild(passcodeLabel);
      bonusActions.appendChild(passcodeInput);
      bonusActions.appendChild(passcodeButton);
      bonusActions.appendChild(passcodeError);
      bonusActions.appendChild(passcodeSuccess);
    }

    function applyMissionConfig(config) {
      const defaultBannerText = `MISSION ${String(currentMissionNumber).padStart(2, "0")}`;
      renderMissionBannerText(config.bannerText || defaultBannerText);
      questionTitleElement.innerHTML = config.questionTitleHtml || missionDefaultConfig.questionTitleHtml;
      problemModalQuestionElement.innerHTML = config.popupQuestionText || missionDefaultConfig.popupQuestionText;
      problemModalImageElement.src = config.popupImageSrc || missionDefaultConfig.popupImageSrc;
      problemModalImageElement.alt = config.popupImageAlt || missionDefaultConfig.popupImageAlt;

      const options = Array.isArray(config.options) ? config.options : missionDefaultConfig.options;
      optionButtons.forEach((button, index) => {
        const option = options[index] || missionDefaultConfig.options[index];
        if (!option) return;
        button.textContent = option.label;
        button.dataset.answer = option.correct ? "true" : "false";
      });

      if (isBonusMission) {
        questionOptionsContainerElement.style.display = "none";
        submitAnswerButton.textContent = config.submitButtonText || "?�답 ?�출";
        submitAnswerButton.disabled = requiresPasscode
          ? localStorage.getItem(bonusGatePassedKey) !== "1"
          : false;
        ensureBonusActions(config);
      } else {
        questionOptionsContainerElement.style.display = "flex";
        // Make sure bonus UI doesn't occupy layout space in normal missions.
        const bonusActions = document.getElementById("bonusActions");
        if (bonusActions) {
          bonusActions.style.display = "none";
          bonusActions.innerHTML = "";
        }
        submitAnswerButton.textContent = "?�답 ?�출";
        submitAnswerButton.disabled = false;
      }
    }

    applyMissionConfig(missionConfig);
    if (!window.location.hash) {
      window.location.hash = `mission${String(currentMissionNumber).padStart(2, "0")}`;
    }
    if (!isMissionStartPage()) {
      setTimeout(() => {
        playMissionStartImpact();
      }, 40);
    }
    let problemModalAutoCloseTimer = null;
    const PROBLEM_MODAL_ANIM_MS = 360;
    let selectedOptionButton = null;
    let isSolved = false;
    let correctCount = 0;
    let wrongCount = 0;
    let bonusScore = 0;

    function readSharedCount(key, fallbackValue) {
      const saved = Number.parseInt(localStorage.getItem(key) || "", 10);
      return Number.isFinite(saved) && saved >= 0 ? saved : fallbackValue;
    }

    function saveSharedCounts() {
      localStorage.setItem(SHARED_COUNT_KEYS.correct, String(correctCount));
      localStorage.setItem(SHARED_COUNT_KEYS.wrong, String(wrongCount));
      localStorage.setItem(SHARED_COUNT_KEYS.bonusScore, String(bonusScore));
    }

    function renderSharedCounts() {
      correctCountElement.textContent = String(correctCount);
      wrongCountElement.textContent = String(wrongCount);
      bonusScoreElement.textContent = String(bonusScore);
    }

    correctCount = readSharedCount(SHARED_COUNT_KEYS.correct, Number.parseInt(correctCountElement.textContent || "0", 10) || 0);
    wrongCount = readSharedCount(SHARED_COUNT_KEYS.wrong, Number.parseInt(wrongCountElement.textContent || "0", 10) || 0);
    bonusScore = readSharedCount(SHARED_COUNT_KEYS.bonusScore, Number.parseInt(bonusScoreElement.textContent || "0", 10) || 0);
    renderSharedCounts();

    optionButtons.forEach((button) => {
      button.addEventListener("click", () => {
        if (isSolved) return;
        if (sfxClickElement) {
          try {
            sfxClickElement.pause();
            sfxClickElement.currentTime = 0;
          } catch (_) {}
          const p = sfxClickElement.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        }
        selectedOptionButton = button;
        optionButtons.forEach((btn) => btn.classList.remove("selected"));
        button.classList.add("selected");
      });
    });

    function setMissionNumber(nextMissionNumber) {
      const n = Number.parseInt(String(nextMissionNumber), 10);
      if (!Number.isFinite(n) || n <= 0) return;
      currentMissionNumber = n;
      bonusGatePassedKey = `toptrumps_bonus_gate_passed_${currentMissionNumber}`;
      missionConfig = {
        ...missionDefaultConfig,
        ...(missionConfigMap[currentMissionNumber] || {})
      };
      isBonusMission = Boolean(missionConfig.isBonus);
      requiresPasscode = Boolean(missionConfig.requirePasscode);

      // Reset per-mission UI state
      isSolved = false;
      selectedOptionButton = null;
      optionButtons.forEach((btn) => btn.classList.remove("selected"));
      clearWrongCrackLayer();

      applyMissionConfig(missionConfig);

      setTimeout(() => {
        playMissionStartImpact();
      }, 30);
    }

    function goToNextMission(url) {
      // Stay on the same page (no reload) so BGM never cuts.
      const match = String(url || "").match(/mission(\d{2})\.html/i);
      const nextNumber = match ? Number.parseInt(match[1], 10) : null;
      if (!nextNumber) return;
      window.location.hash = `mission${String(nextNumber).padStart(2, "0")}`;
      setMissionNumber(nextNumber);
    }

    let correctSfxPendingNextUrl = null;
    let correctSfxPlaying = false;
    function playCorrectSfxThenNavigate(nextUrl) {
      const targetUrl = String(nextUrl || "").trim();
      if (!targetUrl) return;

      if (!sfxCorrectElement) {
        goToNextMission(targetUrl);
        return;
      }

      if (correctSfxPlaying) {
        correctSfxPendingNextUrl = targetUrl;
        return;
      }

      correctSfxPlaying = true;
      correctSfxPendingNextUrl = targetUrl;

      try {
        sfxCorrectElement.pause();
        sfxCorrectElement.currentTime = 0;
      } catch (_) {}

      const finalize = () => {
        if (!correctSfxPlaying) return;
        correctSfxPlaying = false;
        const url = correctSfxPendingNextUrl;
        correctSfxPendingNextUrl = null;
        if (url) goToNextMission(url);
      };

      sfxCorrectElement.onended = finalize;
      sfxCorrectElement.onpause = null;

      const p = sfxCorrectElement.play();
      if (p && typeof p.catch === "function") {
        p.catch(() => {
          // If autoplay is blocked for SFX, just move on immediately.
          finalize();
        });
      }

      // Make navigation slightly faster: finalize a bit before the real 'ended'.
      // (Audio may still be finishing while the next mission UI appears.)
      const EARLY_OFFSET_MS = 180;
      const durationMs = Number.isFinite(sfxCorrectElement.duration) ? Math.floor(sfxCorrectElement.duration * 1000) : 0;
      if (durationMs > 0) {
        const earlyMs = Math.max(0, durationMs - EARLY_OFFSET_MS);
        setTimeout(finalize, earlyMs);
        // Safety fallback in case 'ended' doesn't fire.
        const fallbackMs = Math.max(300, Math.min(7000, durationMs + 160));
        setTimeout(finalize, fallbackMs);
      } else {
        // If duration isn't available yet, fall back to a short constant delay.
        setTimeout(finalize, 900);
      }
    }

    window.addEventListener("hashchange", () => {
      const n = getCurrentMissionNumber();
      if (n !== currentMissionNumber) setMissionNumber(n);
    });

    submitAnswerButton.addEventListener("click", () => {
      if (isSolved) return;

      if (isBonusMission) {
        if (requiresPasscode && localStorage.getItem(bonusGatePassedKey) !== "1") return;
        isSolved = true;
        submitAnswerButton.disabled = true;
        const configuredNextUrl = typeof missionConfig.nextUrl === "string" ? missionConfig.nextUrl.trim() : "";
        const targetNextUrl = configuredNextUrl || getDefaultNextMissionUrl(currentMissionNumber);
        if (targetNextUrl) {
          playCorrectSfxThenNavigate(targetNextUrl);
        }
        return;
      }

      if (!selectedOptionButton) return;
      const isCorrect = selectedOptionButton.dataset.answer === "true"; // ?�번 문제 ?�답: 2�?
      if (isCorrect) {
        correctCount += 1;
      } else {
        wrongCount += 1;
        if (sfxWrongElement) {
          try {
            sfxWrongElement.pause();
            sfxWrongElement.currentTime = 0;
          } catch (_) {}
          const p = sfxWrongElement.play();
          if (p && typeof p.catch === "function") p.catch(() => {});
        }
        spawnWrongCrackMark();
      }
      saveSharedCounts();
      renderSharedCounts();

      if (isCorrect) {
        isSolved = true;
        const configuredNextUrl = typeof missionConfig.nextUrl === "string" ? missionConfig.nextUrl.trim() : "";
        const targetNextUrl = configuredNextUrl || getDefaultNextMissionUrl(currentMissionNumber);
        if (targetNextUrl) {
          playCorrectSfxThenNavigate(targetNextUrl);
        }
        return;
      }
    });

    function positionProblemModalCard() {
      const rect = cardWrap.getBoundingClientRect();
      problemModalCard.style.position = "fixed";
      problemModalCard.style.left = `${Math.max(12, rect.left)}px`;
      problemModalCard.style.top = `${Math.max(12, rect.top)}px`;
      problemModalCard.style.width = `${Math.min(window.innerWidth - 24, rect.width)}px`;
    }

    function openProblemModal() {
      if (sfxPaperElement) {
        try {
          sfxPaperElement.pause();
          sfxPaperElement.currentTime = 0;
        } catch (_) {}
        const p = sfxPaperElement.play();
        if (p && typeof p.catch === "function") p.catch(() => {});
      }
      problemModal.classList.remove("is-closing");
      problemModal.classList.add("is-open");
      problemModal.setAttribute("aria-hidden", "false");
      positionProblemModalCard();
      if (problemModalAutoCloseTimer) clearTimeout(problemModalAutoCloseTimer);
      problemModalAutoCloseTimer = setTimeout(closeProblemModal, 5000);
    }

    function closeProblemModal() {
      if (!problemModal.classList.contains("is-open")) return;
      if (problemModal.classList.contains("is-closing")) return;
      if (sfxPaperElement) {
        try {
          sfxPaperElement.pause();
          sfxPaperElement.currentTime = 0;
        } catch (_) {}
        const p = sfxPaperElement.play();
        if (p && typeof p.catch === "function") p.catch(() => {});
      }
      problemModal.classList.add("is-closing");
      if (problemModalAutoCloseTimer) {
        clearTimeout(problemModalAutoCloseTimer);
        problemModalAutoCloseTimer = null;
      }

      window.setTimeout(() => {
        problemModal.classList.remove("is-open");
        problemModal.classList.remove("is-closing");
        problemModal.setAttribute("aria-hidden", "true");
      }, PROBLEM_MODAL_ANIM_MS);
    }

    openProblemModalButton.addEventListener("click", openProblemModal);
    closeProblemModalButton.addEventListener("click", closeProblemModal);
    problemModal.addEventListener("click", (event) => {
      if (event.target === problemModal) closeProblemModal();
    });
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeProblemModal();
    });
    window.addEventListener("resize", () => {
      if (problemModal.classList.contains("is-open")) positionProblemModalCard();
    });

    // ?�음 ?�이지?�서 ?�요 ???�어?????�도�?공개
    window.topTrumpsFinalTimer = {
      reset() {
        const now = Date.now();
        localStorage.setItem(TIMER_START_KEY, String(now));
      },
      stopAndSave() {
        localStorage.setItem("toptrumps_final_timer_result_ms", String(Date.now() - timerStart));
      }
    };
  </script>
</body>
